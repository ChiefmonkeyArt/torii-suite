<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Own your Torii · Onboarding prototype</title>
<meta name="description" content="Wireframe prototype: seven taps to your own sovereign Torii instance. Bitcoin, nostr, no KYC." />
<meta name="theme-color" content="#1a1613" />

<!-- Fonts (matches Continuum) -->
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ---------- tokens (mirror torii-continuum) ---------- */
:root {
  --background: 30 12% 8%;
  --foreground: 40 16% 93%;
  --card: 32 10% 12%;
  --card-border: 32 10% 20%;
  --primary: 38 92% 58%;
  --primary-fg: 30 20% 10%;
  --muted: 32 10% 18%;
  --muted-foreground: 38 8% 62%;
  --danger: 0 72% 60%;
  --success: 142 60% 55%;
  --radius: 0.75rem;

  --font-display: "Cabinet Grotesk", ui-sans-serif, system-ui, sans-serif;
  --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  overflow-x: hidden;
}

button { font: inherit; cursor: pointer; }
input, select { font: inherit; }

/* ---------- shell ---------- */
.shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 20px 32px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1px solid hsl(var(--card-border));
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: -0.02em;
  font-size: 1.05rem;
}
.brand svg { flex: none; }
.step-counter {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  letter-spacing: 0.02em;
}

main { padding: 28px 0; }

footer {
  padding-top: 20px;
  border-top: 1px solid hsl(var(--card-border));
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
}

/* ---------- typography ---------- */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: hsl(var(--primary));
  margin-bottom: 10px;
}
h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.85rem;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
p.lede {
  color: hsl(var(--muted-foreground));
  font-size: 1rem;
  margin-bottom: 20px;
}
small.mono { font-family: var(--font-mono); color: hsl(var(--muted-foreground)); font-size: 0.8rem; }

/* ---------- controls ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-weight: 700;
  font-size: 0.95rem;
  transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  min-height: 48px;
}
.btn:active { transform: translateY(1px); }

.btn-primary {
  background: hsl(var(--primary));
  color: hsl(var(--primary-fg));
}
.btn-primary:disabled {
  background: hsl(var(--muted));
  color: hsl(var(--muted-foreground));
  cursor: not-allowed;
}
.btn-ghost {
  background: transparent;
  color: hsl(var(--foreground));
  border-color: hsl(var(--card-border));
}
.btn-ghost:hover { border-color: hsl(var(--primary)); color: hsl(var(--primary)); }

.field {
  display: block;
  width: 100%;
  padding: 14px 16px;
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  color: hsl(var(--foreground));
  font-family: var(--font-mono);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.15s ease;
}
.field:focus { border-color: hsl(var(--primary)); }
.field-hint {
  margin-top: 8px;
  font-size: 0.8rem;
  color: hsl(var(--muted-foreground));
}
.field-hint.ok { color: hsl(var(--success)); }
.field-hint.err { color: hsl(var(--danger)); }

/* ---------- cards ---------- */
.card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card.selectable { cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease; }
.card.selectable:hover { border-color: hsl(var(--primary) / 0.5); }
.card.selected {
  border-color: hsl(var(--primary));
  background: hsl(var(--primary) / 0.08);
}

/* ---------- character grid ---------- */
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.avatar-card {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 16px 8px;
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.avatar-card:hover { border-color: hsl(var(--primary) / 0.5); }
.avatar-card.selected {
  border-color: hsl(var(--primary));
  background: hsl(var(--primary) / 0.08);
}
.avatar-svg { width: 64px; height: 64px; }
.avatar-name { font-weight: 700; font-size: 0.85rem; }
.avatar-role { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }

/* ---------- map ---------- */
.map {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 20px;
}
.map-svg { width: 100%; height: auto; display: block; border-radius: 8px; }

/* ---------- pay screen ---------- */
.line-items { list-style: none; }
.line-items li {
  display: flex; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed hsl(var(--card-border));
  font-size: 0.9rem;
}
.line-items li:last-child { border-bottom: none; padding-top: 14px; font-weight: 700; }
.line-items .amount { font-family: var(--font-mono); color: hsl(var(--primary)); }

.slider-block { margin: 18px 0 24px; }
.slider-block label {
  display: flex; justify-content: space-between;
  font-size: 0.85rem; margin-bottom: 10px;
}
input[type="range"] {
  width: 100%;
  accent-color: hsl(var(--primary));
}

.qr-block {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 20px;
  background: white;
  border-radius: var(--radius);
  margin: 20px 0;
}
.qr-caption { color: hsl(var(--primary-fg)); font-size: 0.85rem; font-family: var(--font-mono); }

/* ---------- progress screen ---------- */
.progress-list { list-style: none; }
.progress-list li {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  font-size: 0.9rem;
}
.progress-list .icon {
  flex: none;
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: hsl(var(--muted));
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.progress-list li.done .icon {
  background: hsl(var(--success) / 0.2);
  color: hsl(var(--success));
}
.progress-list li.active .icon {
  background: hsl(var(--primary) / 0.2);
  color: hsl(var(--primary));
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.progress-list .body { flex: 1; }
.progress-list .title { font-weight: 600; }
.progress-list .subtext { color: hsl(var(--muted-foreground)); font-size: 0.8rem; margin-top: 2px; }

/* ---------- done screen ---------- */
.done-cta {
  display: block;
  padding: 18px 20px;
  background: hsl(var(--primary));
  color: hsl(var(--primary-fg));
  border-radius: var(--radius);
  text-align: center;
  font-weight: 800;
  font-family: var(--font-display);
  letter-spacing: -0.01em;
  text-decoration: none;
  margin: 20px 0 14px;
}
.done-secret {
  padding: 14px;
  background: hsl(var(--card));
  border: 1px dashed hsl(var(--card-border));
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  word-break: break-all;
  margin-bottom: 10px;
}
.done-secret .label { color: hsl(var(--primary)); font-weight: 700; margin-bottom: 4px; display:block; }

/* ---------- misc ---------- */
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: hsl(var(--primary) / 0.15);
  color: hsl(var(--primary));
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.02em;
  margin-left: 6px;
}
.disclosure {
  font-size: 0.78rem;
  color: hsl(var(--muted-foreground));
  padding: 10px 12px;
  background: hsl(var(--muted) / 0.4);
  border-left: 3px solid hsl(var(--primary));
  border-radius: 6px;
  margin-top: 16px;
}
.support-split {
  font-size: 0.78rem;
  color: hsl(var(--muted-foreground));
  display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
  padding: 10px 0;
}
.support-split .row { display: contents; }
.support-split .who { color: hsl(var(--foreground)); font-weight: 600; }
</style>
</head>
<body>

<div class="shell">

  <header>
    <div class="brand">
      <!-- torii glyph -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Torii">
        <path d="M2 6 L22 6" stroke="hsl(38 92% 58%)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M3 9 L21 9" stroke="hsl(38 92% 58%)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M5 6 L5 21" stroke="hsl(38 92% 58%)" stroke-width="2" stroke-linecap="round"/>
        <path d="M19 6 L19 21" stroke="hsl(38 92% 58%)" stroke-width="2" stroke-linecap="round"/>
        <path d="M5 12 L19 12" stroke="hsl(38 92% 58%)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>torii · suite</span>
    </div>
    <span class="step-counter" id="stepCounter">1 / 7</span>
  </header>

  <main id="app">
    <!-- screens injected here -->
  </main>

  <footer>
    <button class="btn btn-ghost" id="backBtn" style="visibility:hidden">← back</button>
    <button class="btn btn-primary" id="nextBtn">continue →</button>
  </footer>

</div>

<script>
/* ============================================================
   State — lives only in this tab. Nothing persisted.
   ============================================================ */
const state = {
  step: 1,
  name: "",
  npub: "",
  character: null,   // { id, name, role, svgKey }
  plot: null,        // { id, name, coords }
  supportUsd: 21,
  vpsUsd: 84,        // small tier estimate
  domainUsd: 18,
  routstrUsd: 8,
};

/* ============================================================
   Screens (functions returning HTML)
   ============================================================ */
const screens = [
  screenWelcome,          // 1
  screenPickName,         // 2
  screenConnectSigner,    // 3
  screenPickCharacter,    // 4
  screenPickPlot,         // 5
  screenReviewAndPay,     // 6
  screenBuilding,         // 7
  screenDone,             // 8 — beyond the 7 taps
];

/* ---------------- 1. Welcome ---------------- */
function screenWelcome() {
  return `
    <div class="eyebrow">own your torii</div>
    <h1>Your metaverse. Your AI. Your keys.</h1>
    <p class="lede">
      In about seven taps and ten minutes, you'll have your own Torii — a
      sovereign metaverse home with a shop, a character, and a personal AI
      that answers to your nostr key. No accounts, no KYC, paid in Bitcoin.
    </p>

    <div class="card">
      <h2>What you'll end up with</h2>
      <small class="mono">
        alice.torii.host · continuum agent · quest shop · plebeian storefront · routstr AI · nightly encrypted backups
      </small>
    </div>

    <div class="card">
      <h2>What you'll need</h2>
      <small class="mono">
        · a nostr signer (Plebeian Signer, nos2x, or Amber)<br>
        · a Lightning wallet with ~$100 in sats<br>
        · about ten minutes
      </small>
    </div>

    <div class="disclosure">
      Nothing about your setup touches Torii's servers. Your browser talks
      directly to your VPS host (SHC), your Lightning wallet, and your signer.
      When this tab closes, all secrets live only on your VPS and in a nostr
      DM encrypted to your own key.
    </div>
  `;
}

/* ---------------- 2. Pick a name ---------------- */
function screenPickName() {
  const isValid = /^[a-z0-9][a-z0-9-]{2,30}[a-z0-9]$/.test(state.name);
  const hint = state.name === ""
    ? `<span>lowercase, 3–32 chars, hyphens ok</span>`
    : (isValid
        ? `<span class="ok">✓ ${state.name}.torii.host is available</span>`
        : `<span class="err">try lowercase letters, numbers, and hyphens</span>`);
  return `
    <div class="eyebrow">step one</div>
    <h1>What should we call your Torii?</h1>
    <p class="lede">
      This is your subdomain. You can use your own domain later; for now
      we'll give you one under torii.host.
    </p>

    <label for="nameInput" class="mono" style="font-size:0.85rem; color: hsl(var(--muted-foreground)); display:block; margin-bottom:8px;">
      subdomain
    </label>
    <input
      id="nameInput"
      class="field"
      type="text"
      placeholder="alice"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
      value="${state.name}"
    />
    <div class="field-hint">${hint}</div>

    <div style="margin-top:20px;">
      <small class="mono">preview → <span style="color:hsl(var(--primary))">${state.name || "yourname"}.torii.host</span></small>
    </div>
  `;
}

/* ---------------- 3. Connect signer ---------------- */
function screenConnectSigner() {
  const connected = !!state.npub;
  return `
    <div class="eyebrow">step two</div>
    <h1>Bring your identity.</h1>
    <p class="lede">
      Your nostr key is your login. Nothing we build sees your private key —
      your signer keeps it, and we ask it to sign one challenge to prove
      the npub is yours.
    </p>

    ${connected ? `
      <div class="card selected">
        <h2>Connected</h2>
        <small class="mono" style="word-break: break-all; color: hsl(var(--primary));">
          ${state.npub}
        </small>
        <div style="margin-top:10px;">
          <small class="mono">this npub will own the new Torii instance.</small>
        </div>
      </div>
    ` : `
      <button class="btn btn-primary" id="signerBtn" style="width:100%; margin-bottom:12px;">
        connect with signer
      </button>
      <small class="mono" style="display:block; text-align:center; color: hsl(var(--muted-foreground));">
        opens Plebeian Signer · nos2x · Amber · alby
      </small>
    `}

    <div class="disclosure" style="margin-top:20px;">
      Don't have a signer yet? Install <b>Plebeian Signer</b> (browser) or
      <b>Amber</b> (Android). Neither asks for an email or phone. Your key
      will be safer with them than with a note on your desk.
    </div>
  `;
}

/* ---------------- 4. Pick a character ---------------- */
function screenPickCharacter() {
  const chars = [
    { id: "wanderer", name: "Wanderer",  role: "explorer",  hue: 38  },
    { id: "smith",    name: "Smith",     role: "maker",     hue: 12  },
    { id: "scribe",   name: "Scribe",    role: "writer",    hue: 260 },
    { id: "trader",   name: "Trader",    role: "merchant",  hue: 142 },
  ];
  return `
    <div class="eyebrow">step three</div>
    <h1>Pick your character.</h1>
    <p class="lede">
      This is who represents you in Quest AND the personality behind your
      Continuum agent. Same entity, one identity. You can customise later.
    </p>

    <div class="avatar-grid">
      ${chars.map(c => `
        <div class="avatar-card ${state.character?.id === c.id ? 'selected' : ''}" data-char="${c.id}">
          ${characterSvg(c.hue)}
          <div class="avatar-name">${c.name}</div>
          <div class="avatar-role">${c.role}</div>
        </div>
      `).join("")}
    </div>

    <div class="card">
      <small class="mono">
        Your character's dialogue in Quest will come from your Continuum agent
        (running on your VPS). When someone talks to you in-world and you're
        offline, your AI answers in your voice.
      </small>
    </div>
  `;
}

function characterSvg(hue) {
  return `
    <svg viewBox="0 0 64 64" class="avatar-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="32" cy="24" r="12" fill="hsl(${hue} 60% 55%)" />
      <rect x="16" y="36" width="32" height="24" rx="4" fill="hsl(${hue} 45% 40%)" />
      <rect x="24" y="44" width="16" height="4" rx="2" fill="hsl(${hue} 80% 75%)" />
    </svg>
  `;
}

/* ---------------- 5. Pick a plot ---------------- */
function screenPickPlot() {
  const plots = [
    { id: "square-w", name: "West Square",    xy: [40,  80] },
    { id: "square-e", name: "East Square",    xy: [160, 80] },
    { id: "harbor",   name: "Harbor",         xy: [100, 140]},
    { id: "grove",    name: "Cedar Grove",    xy: [220, 140]},
  ];
  return `
    <div class="eyebrow">step four</div>
    <h1>Where's your shop?</h1>
    <p class="lede">
      Pick a plot in Torii Quest. This becomes your homepage in the metaverse
      and your storefront in Plebeian. You can move later.
    </p>

    <div class="map">
      <svg viewBox="0 0 280 200" class="map-svg" xmlns="http://www.w3.org/2000/svg" aria-label="Torii Quest map">
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="hsl(32 10% 18%)" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="280" height="200" fill="url(#grid)" />
        <!-- paths -->
        <path d="M 0 80 L 280 80 M 100 0 L 100 200 M 200 0 L 200 200"
              stroke="hsl(32 10% 26%)" stroke-width="1.5" fill="none" />
        <!-- torii gate marker (center) -->
        <g transform="translate(140 100)">
          <path d="M -10 -6 L 10 -6" stroke="hsl(38 92% 58%)" stroke-width="1.5"/>
          <path d="M -8 -6 L -8 6 M 8 -6 L 8 6" stroke="hsl(38 92% 58%)" stroke-width="1"/>
        </g>
        <!-- plots -->
        ${plots.map(p => `
          <g data-plot="${p.id}" style="cursor:pointer;">
            <circle cx="${p.xy[0]}" cy="${p.xy[1]}" r="10"
              fill="${state.plot?.id === p.id ? 'hsl(38 92% 58%)' : 'hsl(32 10% 28%)'}"
              stroke="hsl(38 92% 58%)" stroke-width="1.5" />
            <text x="${p.xy[0]}" y="${p.xy[1] + 26}"
                  fill="hsl(40 16% 93%)" font-size="7" text-anchor="middle"
                  font-family="JetBrains Mono" font-weight="500"
                  paint-order="stroke" stroke="hsl(30 12% 8%)" stroke-width="2">${p.name}</text>
          </g>
        `).join("")}
      </svg>
    </div>

    <div class="card ${state.plot ? 'selected' : ''}">
      <h2>${state.plot?.name || "Tap a plot on the map"}</h2>
      <small class="mono">${state.plot ? "You can trade your plot to another operator later." : "each plot is a nostr-signed claim; they're unique but transferable."}</small>
    </div>
  `;
}

/* ---------------- 6. Review + pay ---------------- */
function screenReviewAndPay() {
  const total = state.vpsUsd + state.domainUsd + state.routstrUsd + Number(state.supportUsd);
  return `
    <div class="eyebrow">step five</div>
    <h1>Review and pay.</h1>
    <p class="lede">
      One Lightning invoice, three splits. Your wallet sends the sats straight
      to SHC (for the VPS), Torii (community support), and the Cashu mint (for
      your Routstr top-up). No middleman holds funds.
    </p>

    <ul class="line-items">
      <li><span>SHC VPS <span class="pill">1 year · small tier</span></span><span class="amount">$${state.vpsUsd}</span></li>
      <li><span>Domain <span class="pill">${state.name || "yourname"}.torii.host</span></span><span class="amount">$${state.domainUsd}</span></li>
      <li><span>Routstr Cashu top-up <span class="pill">~1M small-model tokens</span></span><span class="amount">$${state.routstrUsd}</span></li>
      <li><span>Community support</span><span class="amount">$${state.supportUsd}</span></li>
      <li><span>Total</span><span class="amount">$${total}</span></li>
    </ul>

    <div class="slider-block">
      <label>
        <span>Community support fee (optional)</span>
        <span class="mono" style="color:hsl(var(--primary));">$${state.supportUsd}</span>
      </label>
      <input id="supportSlider" type="range" min="0" max="121" step="1" value="${state.supportUsd}" />
      <small class="mono">
        Year one: paid to a Torii Lightning address. Buys you a nostr DM
        support channel, priority feature requests, and a
        <em>Founding&nbsp;Operator</em> tag on your character. Optional and
        one-off — after year one you deal with SHC and the community directly.
      </small>
    </div>

    <h2 style="margin-top:22px;">Who supports what</h2>
    <div class="support-split">
      <div class="row"><span class="who">Hardware · billing · uptime</span><span>SHC (via their portal)</span></div>
      <div class="row"><span class="who">Torii apps · bugs · setup</span><span>Torii (year 1: DM · then GitHub)</span></div>
      <div class="row"><span class="who">Your Lightning wallet</span><span>You (self-custody)</span></div>
      <div class="row"><span class="who">Your nostr key</span><span>You (self-custody)</span></div>
    </div>

    <div class="qr-block">
      <svg width="120" height="120" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-label="Lightning invoice QR (placeholder)">
        <rect width="21" height="21" fill="white"/>
        ${qrMockRects()}
      </svg>
      <div class="qr-caption">tap to pay · $${total} in sats</div>
    </div>

    <div class="disclosure">
      Prices in sats float with BTC. The invoice is regenerated every 60&nbsp;s
      so you're never over- or under-paying. Nothing is provisioned until the
      invoice settles.
    </div>
  `;
}

function qrMockRects() {
  // Deterministic dot pattern — pure decoration for the wireframe.
  let rects = "";
  for (let y = 0; y < 21; y++) {
    for (let x = 0; x < 21; x++) {
      const on = ((x*3 + y*7 + (x*y)) % 5) === 0 || (x<3&&y<3) || (x>17&&y<3) || (x<3&&y>17);
      if (on) rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="black"/>`;
    }
  }
  return rects;
}

/* ---------------- 7. Building ---------------- */
function screenBuilding() {
  const steps = [
    "SHC account created (anonymous, no email)",
    "VPS ordered · paid in sats",
    "Waiting for provisioning_state = ready",
    `DNS: ${state.name || "yourname"}.torii.host → new IP`,
    "Running torii-suite bootstrap over SSH",
    "Continuum agent bound to your npub",
    "Quest shop plot registered on nostr",
    "Plebeian storefront seeded",
    "Ollama pulled · Routstr wallet funded",
    "Live healthcheck: launcher responds 200",
  ];
  const active = 4; // arbitrary for wireframe demo
  return `
    <div class="eyebrow">building</div>
    <h1>Constructing your Torii…</h1>
    <p class="lede">
      This takes about ten minutes. You can close this tab — we'll DM your
      new npub when it's ready. Nothing here needs to stay open.
    </p>

    <ul class="progress-list">
      ${steps.map((s, i) => {
        const cls = i < active ? 'done' : (i === active ? 'active' : '');
        const icon = i < active ? '✓' : (i === active ? '…' : String(i+1));
        return `
          <li class="${cls}">
            <div class="icon">${icon}</div>
            <div class="body">
              <div class="title">${s}</div>
              ${i === active ? `<div class="subtext">running now</div>` : ""}
            </div>
          </li>
        `;
      }).join("")}
    </ul>

    <div class="disclosure">
      Every step above is a real API call your browser is making — to SHC,
      to nostr relays, to your VPS over SSH. Torii's servers see only the
      Lightning invoice. Watch the network tab if you're curious.
    </div>
  `;
}

/* ---------------- 8. Done ---------------- */
function screenDone() {
  const domain = (state.name || "yourname") + ".torii.host";
  return `
    <div class="eyebrow">ready</div>
    <h1>Your Torii is live.</h1>
    <p class="lede">
      You're already logged in — your npub owns the box. Below are the
      secrets your browser generated. Write down the backup passphrase before
      you close this tab: we can't recover it, and SHC can't decrypt your
      backups without it.
    </p>

    <a class="done-cta" href="https://${domain}/" target="_blank" rel="noopener">
      open ${domain} →
    </a>

    <div class="done-secret">
      <span class="label">backup passphrase (record this)</span>
      keep-quiet-river-cedar-braid-sunset-honest-lattice
    </div>

    <div class="done-secret">
      <span class="label">SHC customer login</span>
      ${state.name || "yourname"}@torii · password: (shown once, sent to your npub via DM)
    </div>

    <div class="done-secret">
      <span class="label">operate API key (1-hour · expires soon)</span>
      shc_live_wireframe_placeholder_key_operate_scope_1h
    </div>

    <div class="disclosure">
      A nostr DM encrypted to your npub is on its way — it contains all of
      the above plus your SSH keypair. That DM is the only long-term copy.
      When you close this tab, everything else disappears.
    </div>

    <div style="margin-top:20px;">
      <button class="btn btn-ghost" id="restartBtn" style="width:100%;">start over (wireframe)</button>
    </div>
  `;
}

/* ============================================================
   Render + event wiring
   ============================================================ */
const app = document.getElementById("app");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const stepCounter = document.getElementById("stepCounter");

function render() {
  const idx = Math.min(state.step - 1, screens.length - 1);
  app.innerHTML = screens[idx]();

  // Step counter
  if (state.step <= 7) {
    stepCounter.textContent = `${state.step} / 7`;
  } else {
    stepCounter.textContent = `✓ ready`;
    stepCounter.style.color = "hsl(var(--success))";
  }
  if (state.step <= 7) stepCounter.style.color = "";

  // Back button visibility
  backBtn.style.visibility = state.step > 1 && state.step < 8 ? "visible" : "hidden";

  // Next button label + enabled
  nextBtn.textContent = nextLabel();
  nextBtn.disabled = !canAdvance();

  wireScreenEvents();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function nextLabel() {
  switch (state.step) {
    case 1: return "start →";
    case 2: return "next →";
    case 3: return state.npub ? "next →" : "connect first";
    case 4: return "next →";
    case 5: return "next →";
    case 6: return "pay & build →";
    case 7: return "open my torii →";
    case 8: return "done";
    default: return "→";
  }
}

function canAdvance() {
  switch (state.step) {
    case 1: return true;
    case 2: return /^[a-z0-9][a-z0-9-]{2,30}[a-z0-9]$/.test(state.name);
    case 3: return !!state.npub;
    case 4: return !!state.character;
    case 5: return !!state.plot;
    case 6: return true;
    case 7: return true;   // simulated finish
    case 8: return false;
    default: return false;
  }
}

function wireScreenEvents() {
  // step 2 — name input
  const nameInput = document.getElementById("nameInput");
  if (nameInput) {
    nameInput.addEventListener("input", (e) => {
      state.name = e.target.value.toLowerCase().trim();
      render();
    });
    nameInput.focus();
  }

  // step 3 — signer button (simulated)
  const signerBtn = document.getElementById("signerBtn");
  if (signerBtn) {
    signerBtn.addEventListener("click", () => {
      // Wireframe: fake an npub. Real flow calls window.nostr.getPublicKey().
      state.npub = "npub1wireframeexampleexampleexampleexampleexampleexampleexampleee";
      render();
    });
  }

  // step 4 — character cards
  document.querySelectorAll(".avatar-card").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.char;
      const map = {
        wanderer: {id:"wanderer", name:"Wanderer", role:"explorer"},
        smith:    {id:"smith",    name:"Smith",    role:"maker"},
        scribe:   {id:"scribe",   name:"Scribe",   role:"writer"},
        trader:   {id:"trader",   name:"Trader",   role:"merchant"},
      };
      state.character = map[id];
      render();
    });
  });

  // step 5 — plot cards
  document.querySelectorAll("[data-plot]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.plot;
      const map = {
        "square-w": {id, name:"West Square"},
        "square-e": {id, name:"East Square"},
        "harbor":   {id, name:"Harbor"},
        "grove":    {id, name:"Cedar Grove"},
      };
      state.plot = map[id];
      render();
    });
  });

  // step 6 — slider
  const slider = document.getElementById("supportSlider");
  if (slider) {
    slider.addEventListener("input", (e) => {
      state.supportUsd = Number(e.target.value);
      render();
    });
  }

  // done — restart
  const restart = document.getElementById("restartBtn");
  if (restart) {
    restart.addEventListener("click", () => {
      Object.assign(state, {
        step: 1, name: "", npub: "", character: null, plot: null, supportUsd: 21
      });
      render();
    });
  }
}

nextBtn.addEventListener("click", () => {
  if (!canAdvance()) return;
  state.step = Math.min(state.step + 1, screens.length);
  render();
});

backBtn.addEventListener("click", () => {
  state.step = Math.max(state.step - 1, 1);
  render();
});

// initial render
render();
</script>

</body>
</html>
