<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Own your Torii · Onboarding prototype</title>
<meta name="description" content="Wireframe prototype: seven taps to your own sovereign Torii instance. Bitcoin, nostr, no KYC." />
<meta name="theme-color" content="#1a1613" />

<!-- Fonts (matches Continuum) -->
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ---------- tokens (mirror torii-continuum) ---------- */
:root {
  --background: 30 12% 8%;
  --foreground: 40 16% 93%;
  --card: 32 10% 12%;
  --card-border: 32 10% 20%;
  --primary: 38 92% 58%;
  --primary-fg: 30 20% 10%;
  --muted: 32 10% 18%;
  --muted-foreground: 38 8% 62%;
  --danger: 0 72% 60%;
  --success: 142 60% 55%;
  --radius: 0.75rem;

  --font-display: "Cabinet Grotesk", ui-sans-serif, system-ui, sans-serif;
  --font-body: "Satoshi", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  overflow-x: hidden;
}

button { font: inherit; cursor: pointer; }
input, select { font: inherit; }

/* ---------- shell ---------- */
.shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 20px 32px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  border-bottom: 1px solid hsl(var(--card-border));
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: -0.02em;
  font-size: 1.05rem;
}
.brand svg { flex: none; }
.step-counter {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  letter-spacing: 0.02em;
}

main { padding: 28px 0; }

footer {
  padding-top: 20px;
  border-top: 1px solid hsl(var(--card-border));
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
}

/* ---------- typography ---------- */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: hsl(var(--primary));
  margin-bottom: 10px;
}
h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.85rem;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
p.lede {
  color: hsl(var(--muted-foreground));
  font-size: 1rem;
  margin-bottom: 20px;
}
small.mono { font-family: var(--font-mono); color: hsl(var(--muted-foreground)); font-size: 0.8rem; }

/* ---------- controls ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-weight: 700;
  font-size: 0.95rem;
  transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  min-height: 48px;
}
.btn:active { transform: translateY(1px); }

.btn-primary {
  background: hsl(var(--primary));
  color: hsl(var(--primary-fg));
}
.btn-primary:disabled {
  background: hsl(var(--muted));
  color: hsl(var(--muted-foreground));
  cursor: not-allowed;
}
.btn-ghost {
  background: transparent;
  color: hsl(var(--foreground));
  border-color: hsl(var(--card-border));
}
.btn-ghost:hover { border-color: hsl(var(--primary)); color: hsl(var(--primary)); }

.field {
  display: block;
  width: 100%;
  padding: 14px 16px;
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  color: hsl(var(--foreground));
  font-family: var(--font-mono);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.15s ease;
}
.field:focus { border-color: hsl(var(--primary)); }
.field-hint {
  margin-top: 8px;
  font-size: 0.8rem;
  color: hsl(var(--muted-foreground));
}
.field-hint.ok { color: hsl(var(--success)); }
.field-hint.err { color: hsl(var(--danger)); }

/* ---------- cards ---------- */
.card {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card.selectable { cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease; }
.card.selectable:hover { border-color: hsl(var(--primary) / 0.5); }
.card.selected {
  border-color: hsl(var(--primary));
  background: hsl(var(--primary) / 0.08);
}

/* ---------- character grid ---------- */
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.avatar-card {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 16px 8px;
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.avatar-card:hover { border-color: hsl(var(--primary) / 0.5); }
.avatar-card.selected {
  border-color: hsl(var(--primary));
  background: hsl(var(--primary) / 0.08);
}
.avatar-svg { width: 64px; height: 64px; }
.avatar-name { font-weight: 700; font-size: 0.85rem; }
.avatar-role { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }

/* ---------- map ---------- */
.map {
  background: hsl(var(--card));
  border: 1px solid hsl(var(--card-border));
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 20px;
}
.map-svg { width: 100%; height: auto; display: block; border-radius: 8px; }

/* ---------- pay screen ---------- */
.line-items { list-style: none; }
.line-items li {
  display: flex; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed hsl(var(--card-border));
  font-size: 0.9rem;
}
.line-items li:last-child { border-bottom: none; padding-top: 14px; font-weight: 700; }
.line-items .amount { font-family: var(--font-mono); color: hsl(var(--primary)); }

.slider-block { margin: 18px 0 24px; }
.slider-block label {
  display: flex; justify-content: space-between;
  font-size: 0.85rem; margin-bottom: 10px;
}
input[type="range"] {
  width: 100%;
  accent-color: hsl(var(--primary));
}

.qr-block {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 20px;
  background: white;
  border-radius: var(--radius);
  margin: 20px 0;
}
.qr-caption { color: hsl(var(--primary-fg)); font-size: 0.85rem; font-family: var(--font-mono); }

/* ---------- progress screen ---------- */
.progress-list { list-style: none; }
.progress-list li {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  font-size: 0.9rem;
}
.progress-list .icon {
  flex: none;
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: hsl(var(--muted));
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
}
.progress-list li.done .icon {
  background: hsl(var(--success) / 0.2);
  color: hsl(var(--success));
}
.progress-list li.active .icon {
  background: hsl(var(--primary) / 0.2);
  color: hsl(var(--primary));
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.progress-list .body { flex: 1; }
.progress-list .title { font-weight: 600; }
.progress-list .subtext { color: hsl(var(--muted-foreground)); font-size: 0.8rem; margin-top: 2px; }

/* ---------- done screen ---------- */
.done-cta {
  display: block;
  padding: 18px 20px;
  background: hsl(var(--primary));
  color: hsl(var(--primary-fg));
  border-radius: var(--radius);
  text-align: center;
  font-weight: 800;
  font-family: var(--font-display);
  letter-spacing: -0.01em;
  text-decoration: none;
  margin: 20px 0 14px;
}
.done-secret {
  padding: 14px;
  background: hsl(var(--card));
  border: 1px dashed hsl(var(--card-border));
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  word-break: break-all;
  margin-bottom: 10px;
}
.done-secret .label { color: hsl(var(--primary)); font-weight: 700; margin-bottom: 4px; display:block; }

/* ---------- misc ---------- */
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: hsl(var(--primary) / 0.15);
  color: hsl(var(--primary));
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.02em;
  margin-left: 6px;
}
.disclosure {
  font-size: 0.78rem;
  color: hsl(var(--muted-foreground));
  padding: 10px 12px;
  background: hsl(var(--muted) / 0.4);
  border-left: 3px solid hsl(var(--primary));
  border-radius: 6px;
  margin-top: 16px;
}
.support-split {
  font-size: 0.78rem;
  color: hsl(var(--muted-foreground));
  display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
  padding: 10px 0;
}
.support-split .row { display: contents; }
.support-split .who { color: hsl(var(--foreground)); font-weight: 600; }
</style>
</head>
<body>

<div class="shell">

  <header>
    <div class="brand">
      <!-- torii glyph -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Torii">
        <path d="M2 6 L22 6" stroke="hsl(38 92% 58%)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M3 9 L21 9" stroke="hsl(38 92% 58%)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M5 6 L5 21" stroke="hsl(38 92% 58%)" stroke-width="2" stroke-linecap="round"/>
        <path d="M19 6 L19 21" stroke="hsl(38 92% 58%)" stroke-width="2" stroke-linecap="round"/>
        <path d="M5 12 L19 12" stroke="hsl(38 92% 58%)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>torii · suite</span>
    </div>
    <span class="step-counter" id="stepCounter">1 / 7</span>
  </header>

  <main id="app">
    <!-- screens injected here -->
  </main>

  <footer>
    <button class="btn btn-ghost" id="backBtn" style="visibility:hidden">← back</button>
    <button class="btn btn-primary" id="nextBtn">continue →</button>
  </footer>

</div>

<script type="module">
/* ============================================================
   v0.1.3 — wired to real bridges.

   Import order matters:
     1. shc-mock installs window.__shcMock/__websshMock IFF ?mock=1.
     2. shc-client and webssh-client then transparently pick up the
        shims and skip real fetch/WebSocket calls.
   ============================================================ */
import { installShcMock, isMockMode } from "./lib/shc-mock.mjs";
import { createShcClient, ShcError } from "./lib/shc-client.mjs";
import { openWebSsh } from "./lib/webssh-client.mjs";
import { generateSshKeyPair, probeEd25519 } from "./lib/ssh-keygen.mjs";
import { generateQrSvg } from "./lib/qr.mjs";

installShcMock();
const shc = createShcClient();

// Bootstrap URL — main branch of the public torii-suite repo. Every VPS runs
// exactly this script on first boot; the source is auditable.
const BOOTSTRAP_URL = "https://raw.githubusercontent.com/ChiefmonkeyArt/torii-suite/main/bootstrap.sh";
// WebSSH bridge — same-origin path served by the onboarding VPS's nginx.
const WEBSSH_URL = (typeof window !== "undefined" ? location.origin.replace(/^http/, "ws") : "") + "/webssh";

/* ============================================================
   State — lives only in this tab. Nothing persisted.
   ============================================================ */
const state = {
  step: 1,
  name: "",
  npub: "",
  character: null,     // { id, name, role, svgKey }
  plot: null,          // { id, name, coords }
  supportUsd: 21,
  vpsUsd: 84,          // filled from real preview once we have it
  domainUsd: 18,
  routstrUsd: 8,

  // v0.1.3 additions — populated by the wire-up.
  sshKeys: null,       // { publicKey, privateKey, fingerprint }
  catalogItem: null,   // chosen OrderablePlan from /ordering/catalog
  serviceId: null,     // set on submitOrder
  invoiceId: null,
  checkoutUrl: null,
  vmSummary: null,     // latest /vm/{id}/summary
  buildLog: [],        // WebSSH stdout/stderr lines
  buildStatus: "idle", // idle | ordering | waiting_pay | provisioning | bootstrapping | done | failed
  buildError: null,
  keyExpiresAt: null,  // from register api_key.expires_at
};

// Small helper so screens can log lifecycle events without touching the DOM.
function appendLog(kind, text) {
  // Split multi-line chunks so the UI renders one line per entry.
  for (const line of String(text).split(/\r?\n/)) {
    if (line.length === 0) continue;
    state.buildLog.push({ kind, line, ts: Date.now() });
    if (state.buildLog.length > 200) state.buildLog.shift();
  }
  // Only re-render if we're on screen 7 — avoids thrash.
  if (state.step === 7) render();
}

// Human-readable error extractor. Never leak the raw stack to the UI —
// ShcError.code is stable, err.message is safe, everything else is noise.
function humanError(err) {
  if (err instanceof ShcError) {
    const detail = err.details?.message || err.details?.error;
    return detail ? `${err.code}: ${detail}` : `${err.code}: ${err.message}`;
  }
  return err?.message || String(err);
}

// Pick the cheapest catalog item. SHC has shipped both `pricings` and
// `pricing` shapes in different versions of the spec, so we accept either.
// We prefer the smallest yearly plan, then fall back to any pricing.
function pickCatalogItem(catalog) {
  const items = catalog?.items || catalog || [];
  if (!Array.isArray(items) || items.length === 0) {
    throw new ShcError({ code: "empty_catalog", message: "SHC catalog is empty — cannot order." });
  }

  const pricingsOf = (it) => {
    const raw = it.pricings || it.pricing || [];
    return Array.isArray(raw) ? raw : [raw];
  };

  const toEntry = (it, p) => ({
    packageId: it.package_id ?? it.id,
    pricingId: p?.pricing_id ?? p?.id,
    name: it.name || "NVMe VPS",
    price: Number(p?.price ?? p?.amount ?? 0),
    period: p?.period || "month",
    currency: p?.currency || "USD",
    moduleGroupId: it.module_group_id ?? null,
  });

  // Pass 1: cheapest yearly.
  let best = null;
  for (const it of items) {
    for (const p of pricingsOf(it)) {
      if (!p || !/year/i.test(String(p.period || ""))) continue;
      const e = toEntry(it, p);
      if (!best || e.price < best.price) best = e;
    }
  }
  if (best) return best;

  // Pass 2: cheapest any-period. Monthly prices are annualized so the
  // total the user sees on screen 6 still reads correctly.
  for (const it of items) {
    for (const p of pricingsOf(it)) {
      if (!p) continue;
      const e = toEntry(it, p);
      if (/month/i.test(e.period)) e.price = e.price * 12; // annualize
      if (!best || e.price < best.price) best = e;
    }
  }
  if (best) return best;

  // Pass 3: absolute last resort — first item, first pricing, zero-cost.
  return toEntry(items[0], pricingsOf(items[0])[0] || {});
}

// Screen 6 → screen 7 handshake. Runs the full SHC ordering sequence
// end-to-end. Any failure sets buildStatus=failed and stores buildError so
// the review screen re-renders with a readable message; the caller then
// declines to advance.
async function runOrderingFlow() {
  if (!state.npubHex) {
    throw new ShcError({ code: "missing_signer", message: "Connect your nostr signer first (step 3)." });
  }
  if (!state.name) {
    throw new ShcError({ code: "missing_hostname", message: "Pick a name first (step 2)." });
  }

  state.buildStatus = "ordering";
  state.buildError = null;
  render();

  // 1. Probe Ed25519 support (Safari <16 fails silently otherwise).
  const probe = await probeEd25519();
  if (!probe.supported) {
    throw new ShcError({
      code: "no_ed25519",
      message: "This browser doesn't support Ed25519. Use Firefox, Chrome, or Safari 16+.",
    });
  }

  // 2. Generate the SSH key pair in-browser. Private key never leaves this tab.
  if (!state.sshKeys) {
    state.sshKeys = await generateSshKeyPair({
      comment: `torii-onboarding-${state.name}`,
    });
  }

  // 3. Register (or reuse) an SHC account. We use the npub-hex as a stable
  //    per-tab identity — every fresh browser session gets its own account,
  //    which is fine because the API key is DM'd to the npub for recovery.
  const email = `${state.npubHex.slice(0, 16)}@torii.anon.invalid`;
  const password = state.npubHex.slice(0, 32) + "!Aa1"; // meets typical policy
  if (!shc.getSession()) {
    const reg = await shc.register({
      email,
      password,
      firstName: "torii",
      lastName: state.name.slice(0, 24),
    });
    state.keyExpiresAt = reg?.api_key?.expires_at || null;
  }

  // 4. Load the catalog and pick a plan.
  const catalog = await shc.getCatalog({ view: "lean" });
  const chosen = pickCatalogItem(catalog);
  state.catalogItem = chosen;
  state.vpsUsd = Math.round(chosen.price);

  // 5. Preview the order — surfaces validation errors before we spend the
  //    idempotency key on submit.
  const hostname = `${state.name}.torii.host`;
  await shc.previewOrder({
    packageId: chosen.packageId,
    pricingId: chosen.pricingId,
    hostname,
    sshKey: state.sshKeys.publicKey,
    moduleGroupId: chosen.moduleGroupId,
  });

  // 6. Submit the order. Idempotency key is stable per (npub, hostname) so
  //    a double-click can't create a duplicate service.
  const submitKey = `torii-submit-${state.npubHex.slice(0, 24)}-${state.name}`;
  const submitted = await shc.submitOrder({
    packageId: chosen.packageId,
    pricingId: chosen.pricingId,
    hostname,
    sshKey: state.sshKeys.publicKey,
    moduleGroupId: chosen.moduleGroupId,
    idempotencyKey: submitKey,
  });
  state.serviceId = submitted?.service_ids?.[0] ?? submitted?.services?.[0]?.service_id;
  state.invoiceId = submitted?.invoice?.invoice_id ?? submitted?.invoice_id;
  if (!state.serviceId || !state.invoiceId) {
    throw new ShcError({
      code: "malformed_submit",
      message: "Order submitted but no service_id/invoice_id came back.",
      details: submitted,
    });
  }

  // 7. Request the BTCPay checkout URL. If the invoice is somehow already
  //    paid (unlikely but the API allows it) we skip straight to provisioning.
  const checkout = await shc.checkoutPayment({
    invoiceId: state.invoiceId,
    gateway: "btcpay_server",
    idempotencyKey: submitKey + "-pay",
  });
  if (checkout?.status === "checkout_required") {
    state.checkoutUrl = checkout.checkout_url;
    state.buildStatus = "waiting_pay";
  } else {
    state.checkoutUrl = null;
    state.buildStatus = "provisioning";
  }
  render();
}

// Screen 7 lifecycle. Polls SHC until the VM is ready, then opens WebSSH
// and streams the bootstrap script. buildLog is populated via appendLog so
// the terminal card re-renders line by line.
async function runProvisioning() {
  if (!state.serviceId) {
    throw new ShcError({ code: "no_service", message: "No serviceId yet — order hasn't been placed." });
  }

  state.buildStatus = "provisioning";
  state.buildError = null;
  appendLog("info", "[torii] waiting for SHC to hand you a warm VPS…");

  const summary = await shc.waitForReady(state.serviceId, {
    intervalMs: 4000,
    timeoutMs: 15 * 60 * 1000,
    onUpdate: (s) => {
      state.vmSummary = s;
      // Only surface state changes to avoid log spam.
      const last = state.buildLog[state.buildLog.length - 1];
      const line = `[shc] provisioning_state=${s.provisioning_state}` +
        (s.recent_jobs?.[0]?.progress != null ? ` progress=${s.recent_jobs[0].progress}%` : "");
      if (!last || last.line !== line) appendLog("info", line);
    },
  });
  state.vmSummary = summary;

  const ip = summary?.ips?.[0]?.ip;
  const osUser = summary?.os_user || "debian";
  if (!ip) {
    throw new ShcError({ code: "no_ip", message: "VM ready but no IP was returned.", details: summary });
  }
  appendLog("info", `[torii] VPS is up at ${ip}. Opening WebSSH…`);

  // Bootstrap runs the pinned main-branch script via curl. The one-liner is
  // the single point of trust — see reference/README.md for the audit trail.
  const bootstrapCmd = `bash <(curl -fsSL ${BOOTSTRAP_URL})`;
  state.buildStatus = "bootstrapping";
  render();

  await new Promise((resolve, reject) => {
    let settled = false;
    const finish = (fn) => { if (settled) return; settled = true; fn(); };

    const session = openWebSsh({
      url: WEBSSH_URL,
      host: ip,
      port: 22,
      username: osUser,
      privateKey: state.sshKeys.privateKey,
      command: bootstrapCmd,
      onReady: () => appendLog("info", `[webssh] connected as ${osUser}@${ip}`),
      onOutput: (kind, chunk) => appendLog(kind === "stderr" ? "err" : "out", chunk),
      onError: (msg) => {
        appendLog("err", `[webssh] ${msg}`);
        finish(() => reject(new ShcError({ code: "webssh_error", message: msg })));
      },
      onExit: (exitCode) => {
        appendLog(exitCode === 0 ? "info" : "err", `[webssh] bootstrap exited with code ${exitCode}`);
        // Settle FIRST, then close the socket. Some bridges (and the mock)
        // emit onClose synchronously from close(), which would race with
        // this settle path and reject a successful run.
        if (exitCode === 0) finish(resolve);
        else finish(() => reject(new ShcError({ code: "bootstrap_failed", message: `bootstrap exited ${exitCode}` })));
        try { session.close?.(); } catch { /* already closed */ }
      },
      onClose: () => {
        // Only surface as an error if we haven't already settled on exit.
        finish(() => reject(new ShcError({ code: "webssh_closed", message: "WebSSH closed before bootstrap finished." })));
      },
    });
  });

  state.buildStatus = "done";
  render();
}

function qrMockRects() {
  // Deterministic dot pattern — pure decoration for the wireframe.
  let rects = "";
  for (let y = 0; y < 21; y++) {

      const on = ((x*3 + y*7 + (x*y)) % 5) === 0 || (x<3&&y<3) || (x>17&&y<3) || (x<3&&y>17);
      if (on) rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="black"/>`;
    }
  }
  return rects;
}

    { key: "bootstrap",label: "Running torii-suite bootstrap over SSH",                 done: status === "done", active: status === "bootstrapping" },

/* ============================================================
   Render + event wiring
   ============================================================ */
const app = document.getElementById("app");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const stepCounter = document.getElementById("stepCounter");

function render() {
  const idx = Math.min(state.step - 1, screens.length - 1);
  app.innerHTML = screens[idx]();

  // Step counter
  if (state.step <= 7) {
    stepCounter.textContent = `${state.step} / 7`;
  } else {
    stepCounter.textContent = `✓ ready`;
    stepCounter.style.color = "hsl(var(--success))";
  }
  if (state.step <= 7) stepCounter.style.color = "";

  // Back button visibility
  backBtn.style.visibility = state.step > 1 && state.step < 8 ? "visible" : "hidden";

  // Next button label + enabled
  nextBtn.textContent = nextLabel();
  nextBtn.disabled = !canAdvance();

  wireScreenEvents();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function nextLabel() {
  switch (state.step) {
    case 1: return "start →";
    case 2: return "next →";
    case 3: return state.npub ? "next →" : "connect first";
    case 4: return "next →";
    case 5: return "next →";
    case 6:
      if (state.buildStatus === "ordering") return "generating invoice…";
      if (state.buildStatus === "failed")   return "try again →";
      if (state.checkoutUrl)                return "paid — build now →";
      return "pay & build →";
    case 7:
      if (state.buildStatus === "done") return "open my torii →";
      if (state.buildStatus === "failed") return "build failed";
      return "building…";
    case 8: return "done";
    default: return "→";
  }
}

function canAdvance() {
  switch (state.step) {
    case 1: return true;
    case 2: return /^[a-z0-9][a-z0-9-]{2,30}[a-z0-9]$/.test(state.name);
    case 3: return !!state.npub;
    case 4: return !!state.character;
    case 5: return !!state.plot;
    // Step 6 is always advanceable — the click handler intercepts to run
    // the ordering flow first (which is a two-tap sequence: order, then pay).
    case 6: return state.buildStatus !== "ordering" && state.buildStatus !== "bootstrapping";
    // Step 7 only advances when the VPS is fully built — no fake finish.
    case 7: return state.buildStatus === "done";
    case 8: return false;
    default: return false;
  }
}

function wireScreenEvents() {
  // step 2 — name input
  const nameInput = document.getElementById("nameInput");
  if (nameInput) {
    nameInput.addEventListener("input", (e) => {
      state.name = e.target.value.toLowerCase().trim();
      render();
    });
    nameInput.focus();
  }

  // step 3 — signer button (real NIP-07)
  const signerBtn = document.getElementById("signerBtn");
  if (signerBtn) {
    signerBtn.addEventListener("click", async () => {
      signerBtn.disabled = true;
      signerBtn.textContent = "waiting for signer…";
      try {
        if (!window.nostr || typeof window.nostr.getPublicKey !== "function") {
          throw new Error("no NIP-07 signer detected — install Plebeian Signer, nos2x, Amber, or alby");
        }
        const hexPubkey = await window.nostr.getPublicKey();
        if (typeof hexPubkey !== "string" || !/^[0-9a-f]{64}$/i.test(hexPubkey)) {
          throw new Error("signer returned an invalid public key");
        }
        // Store the hex pubkey for the register step; render the npub
        // form for humans. We do NOT round-trip through a bech32 lib to
        // keep the bundle dep-free — the hex is what SHC will hash into
        // the account label anyway. UX-facing text uses npub1… (truncated).
        state.npub = "npub1" + hexPubkey.slice(0, 12) + "…" + hexPubkey.slice(-8);
        state.npubHex = hexPubkey;
        render();
      } catch (err) {
        signerBtn.disabled = false;
        signerBtn.textContent = "connect with signer";
        const hint = document.getElementById("signerErr");
        if (hint) hint.textContent = err.message || "signer failed";
      }
    });
  }

  // step 4 — character cards
  document.querySelectorAll(".avatar-card").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.char;
      const map = {
        wanderer: {id:"wanderer", name:"Wanderer", role:"explorer"},
        smith:    {id:"smith",    name:"Smith",    role:"maker"},
        scribe:   {id:"scribe",   name:"Scribe",   role:"writer"},
        trader:   {id:"trader",   name:"Trader",   role:"merchant"},
      };
      state.character = map[id];
      render();
    });
  });

  // step 5 — plot cards
  document.querySelectorAll("[data-plot]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.dataset.plot;
      const map = {
        "square-w": {id, name:"West Square"},
        "square-e": {id, name:"East Square"},
        "harbor":   {id, name:"Harbor"},
        "grove":    {id, name:"Cedar Grove"},
      };
      state.plot = map[id];
      render();
    });
  });

  // step 6 — slider
  const slider = document.getElementById("supportSlider");
  if (slider) {
    slider.addEventListener("input", (e) => {
      state.supportUsd = Number(e.target.value);
      render();
    });
  }

  // done — restart
  const restart = document.getElementById("restartBtn");
  if (restart) {
    restart.addEventListener("click", () => {
      Object.assign(state, {
        step: 1,
        name: "",
        npub: "",
        npubHex: null,
        character: null,
        plot: null,
        supportUsd: 21,
        // v0.1.3 build state — must be cleared so a second run through
        // the wizard starts from a clean slate.
        sshKeys: null,
        catalogItem: null,
        serviceId: null,
        invoiceId: null,
        checkoutUrl: null,
        vmSummary: null,
        buildLog: [],
        buildStatus: "idle",
        buildError: null,
        keyExpiresAt: null,
      });
      // Reset the SHC client so a fresh account can be minted on the next run.
      try { shc.clearCredentials?.(); } catch { /* ignore */ }
      render();
    });
  }
}

// Guard so a double-click or a stray Enter can't kick off two ordering
// runs in parallel. The button itself is disabled during the async work,
// but keyboard events can slip through if we don't gate this centrally.
let nextBusy = false;

nextBtn.addEventListener("click", async () => {
  if (nextBusy) return;
  if (!canAdvance()) return;

  // Step 6 → 7: intercept and run the ordering flow. If we've already
  // ordered (checkoutUrl set OR buildStatus === "provisioning"), we skip
  // straight to the transition so paying users don't re-order.
  if (state.step === 6 && !state.checkoutUrl && state.buildStatus !== "provisioning") {
    nextBusy = true;
    nextBtn.disabled = true;
    try {
      await runOrderingFlow();
    } catch (err) {
      state.buildStatus = "failed";
      state.buildError = humanError(err);
      render();
      return;
    } finally {
      nextBusy = false;
    }
    // After ordering, stay on step 6 so the user can see the QR / checkout
    // URL and pay. They tap “pay & build” again to advance.
    render();
    return;
  }

  // Step 6 (already ordered) → 7: advance, then kick off provisioning.
  if (state.step === 6 && (state.checkoutUrl || state.buildStatus === "provisioning")) {
    state.step = 7;
    render();
    nextBusy = true;
    nextBtn.disabled = true;
    try {
      await runProvisioning();
    } catch (err) {
      state.buildStatus = "failed";
      state.buildError = humanError(err);
      appendLog("err", `[torii] ${state.buildError}`);
      render();
      return;
    } finally {
      nextBusy = false;
      render();
    }
    return;
  }

  // Step 7 → 8: only allow if provisioning is actually done. If the user
  // taps early, we no-op — canAdvance() below will be tightened to reflect this.
  if (state.step === 7 && state.buildStatus !== "done") {
    return;
  }

  state.step = Math.min(state.step + 1, screens.length);
  render();
});

backBtn.addEventListener("click", () => {
  state.step = Math.max(state.step - 1, 1);
  render();
});

// initial render
render();
</script>

</body>
</html>
